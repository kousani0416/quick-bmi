<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="QuickBMI - a fast, privacy-first BMI calculator."
    />
    <title>QuickBMI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="app__header">
        <h1>QuickBMI</h1>
        <p>Fast. Private. Single-screen BMI check.</p>
      </header>

      <section class="card controls" aria-label="BMI Input">
        <div class="toggle" role="radiogroup" aria-label="Unit Selection">
          <button id="metricBtn" class="toggle__btn is-active" data-unit="metric">
            Metric
          </button>
          <button id="imperialBtn" class="toggle__btn" data-unit="imperial">
            Imperial
          </button>
        </div>

        <div id="metricFields" class="fields">
          <label class="field">
            <span>Height (cm)</span>
            <input
              id="heightCm"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.1"
              placeholder="e.g. 170"
            />
          </label>
          <label class="field">
            <span>Weight (kg)</span>
            <input
              id="weightKg"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.1"
              placeholder="e.g. 70"
            />
          </label>
        </div>

        <div id="imperialFields" class="fields hidden">
          <label class="field">
            <span>Height (ft)</span>
            <input
              id="heightFt"
              type="number"
              inputmode="numeric"
              min="0"
              step="1"
              placeholder="e.g. 5"
            />
          </label>
          <label class="field">
            <span>Height (in)</span>
            <input
              id="heightIn"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.1"
              placeholder="e.g. 7"
            />
          </label>
          <label class="field">
            <span>Weight (lbs)</span>
            <input
              id="weightLbs"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.1"
              placeholder="e.g. 154"
            />
          </label>
        </div>

        <button id="calculateBtn" class="btn">Calculate BMI</button>
        <p id="message" class="message" role="status"></p>
      </section>

      <section id="resultCard" class="card result hidden" aria-label="BMI Result">
        <h2>Your Result</h2>
        <p class="result__bmi">
          BMI: <strong id="bmiValue">--</strong>
        </p>
        <p class="result__category">
          Category: <span id="bmiCategory">--</span>
        </p>
        <p id="healthTip" class="result__tip"></p>
      </section>

      <section class="banner-ad" aria-label="Banner Ad Placeholder">
        <p>Ad Banner Placeholder</p>
      </section>
    </main>

    <div id="interstitial" class="interstitial hidden" role="dialog" aria-modal="true">
      <div class="interstitial__content">
        <h3>Sponsored</h3>
        <p>Interstitial Ad Placeholder (every 3 calculations)</p>
        <button id="closeInterstitial" class="btn btn--small">Continue</button>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
